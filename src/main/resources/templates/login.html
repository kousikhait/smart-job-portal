<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Smart Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="layout-main">
<div class="card form-card">
    <h2>Login</h2>

    <!-- Error Message -->
    <div th:if="${error}" class="error-text" th:text="${error}"></div>

    <!-- Logout Message -->
    <div th:if="${param.logout}" class="logout">
        You have been logged out
    </div>

    <form action="/login" method="post" class="stack">
        <div class="form-field">
            <label>Email</label>
            <input type="text" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <p class="muted">New user? <a href="/signup">Register here</a></p>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>

</div>
</div>

</body>
</html>
