<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Job</title>
</head>
<body>

<h2>Add New Job</h2>

<form th:action="@{/recruiter/add-job}" th:object="${job}" method="post">

    <label>Title:</label>
    <input type="text" th:field="*{title}" required />
    <br><br>

    <label>Description:</label>
    <input type="text" th:field="*{description}" required />
    <br><br>

    <label>Location:</label>
    <input type="text" th:field="*{location}" required />
    <br><br>

    <label>Salary:</label>
    <input type="number" th:field="*{salary}" required />
    <br><br>

    <button type="submit">Post Job</button>

</form>

</body>
</html>
