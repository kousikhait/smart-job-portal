<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script>
        function toggleFields() {
            let role = document.getElementById("role").value;

            if (role === "JOB_SEEKER") {
                document.getElementById("userFields").style.display = "block";
                document.getElementById("recruiterFields").style.display = "none";
            } else if (role === "RECRUITER") {
                document.getElementById("userFields").style.display = "none";
                document.getElementById("recruiterFields").style.display = "block";
            } else {
                document.getElementById("userFields").style.display = "none";
                document.getElementById("recruiterFields").style.display = "none";
            }
        }
    </script>
</head>
<body>

<div class="layout-main">
<div class="card form-card">

<h2>Sign up</h2>

<div th:if="${error}" class="error-text" th:text="${error}"></div>

<form th:action="@{/signup}" method="post" class="stack">

    <!-- Common fields -->
    <div class="form-field">
        <label>Name</label>
        <input type="text" name="name" placeholder="Full name" required>
    </div>
    <div class="form-field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="form-field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required>
    </div>

    <!-- Role Selection -->
    <div class="form-field">
        <label>Register as</label>
        <select name="roleName" id="role" onchange="toggleFields()" required>
            <option value="">Select role</option>
            <option value="JOB_SEEKER">Job Seeker</option>
            <option value="RECRUITER">Recruiter</option>
        </select>
    </div>

    <!-- USER FIELDS -->
    <div id="userFields" style="display:none;" class="stack">
        <h4>Job Seeker Details</h4>
        <div class="form-field">
            <label>Experience (years)</label>
            <input type="number" name="experience" min="0">
        </div>
        <div class="form-field">
            <label>Skills (comma separated)</label>
            <input type="text" name="skillsInput" placeholder="e.g. Java, Spring Boot, SQL">
        </div>
    </div>

    <!-- RECRUITER FIELDS -->
    <div id="recruiterFields" style="display:none;" class="stack">
        <h4>Recruiter Details</h4>
        <div class="form-field">
            <label>Company Name</label>
            <input type="text" name="companyName" placeholder="Company Name">
        </div>
        <div class="form-field">
            <label>Company Location</label>
            <input type="text" name="companyLocation" placeholder="City, Country">
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Register</button>

</form>

</div>
</div>

</body>
</html>
